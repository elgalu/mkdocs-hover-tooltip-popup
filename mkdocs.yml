site_name: Hover Tooltip Popup Plugin for MkDocs
site_dir: public
repo_name: elgalu/mkdocs-hover-tooltip-popup
repo_url: https://github.com/elgalu/mkdocs-hover-tooltip-popup
site_url: https://elgalu.github.io/mkdocs-hover-tooltip-popup/

theme:
  name: material
  icon:
    logo: material/magnify-scan
  palette:
    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  features:
    - content.code.copy
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top

# Possible extensions: https://python-markdown.github.io/sitemap.html
# More extensions: https://facelessuser.github.io/pymdown-extensions/
markdown_extensions:
  # attr_list and md_in_html allows to add annotations (tooltips)
  # https://squidfunk.github.io/mkdocs-material/reference/annotations/#configuration
  - markdown.extensions.attr_list:
  - markdown.extensions.md_in_html:
  - markdown.extensions.def_list:
  - markdown.extensions.toc:
      slugify: !!python/object/apply:pymdownx.slugs.slugify {kwds: {case: lower}}
      permalink: true
  - markdown.extensions.admonition:
  - markdown.extensions.smarty:
      smart_quotes: false
  - markdown.extensions.extra:
  # markdown.extensions.meta allows to add a meta description to the page with no rendering
  # markdown.extensions.meta:
  # abbr enables abbreviations from a includes/abbreviations.md project-wide glossary
  # - markdown.extensions.abbr:
  # https://squidfunk.github.io/mkdocs-material/reference/footnotes/#adding-footnote-references
  - markdown.extensions.footnotes:
  # tables: https://squidfunk.github.io/mkdocs-material/reference/data-tables/#usage
  - markdown.extensions.tables:
  # https://facelessuser.github.io/pymdown-extensions/extensions/blocks/plugins/details/#usage
  - pymdownx.blocks.details:
  # https://facelessuser.github.io/pymdown-extensions/extensions/details/
  - pymdownx.details:
  # https://facelessuser.github.io/pymdown-extensions/extensions/keys/
  - pymdownx.keys:
      separator: '+'
  # emoji: https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/#using-emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  # https://squidfunk.github.io/mkdocs-material/reference/lists/#using-task-lists
  - pymdownx.tasklist:
      custom_checkbox: true
  # https://facelessuser.github.io/pymdown-extensions/extensions/magiclink/
  - pymdownx.magiclink:
      repo_url_shortener: true
      repo_url_shorthand: true
  # Use classic tabbed extension (blocks.tab can conflict with Material & fenced code inside)
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      # Make the build fail if a snippet can't be found
      check_paths: true
      # auto_append: a way to append a given file to every Markdown document
      # https://facelessuser.github.io/pymdown-extensions/extensions/snippets/#auto-append-snippets
      # auto_append:
      #   # https://squidfunk.github.io/mkdocs-material/reference/tooltips/#adding-a-glossary
      #   - includes/abbreviations.md
  # `pymdownx.highlight` syntax highlighting on code blocks and inline code blocks
  # https://squidfunk.github.io/mkdocs-material/reference/code-blocks/#code-blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  # inlinehilite colored code line, e.g.`#!py3 import pymdownx`
  - pymdownx.inlinehilite:
  # https://facelessuser.github.io/pymdown-extensions/extensions/mark/
  - pymdownx.mark:
  # `pymdownx.extra` breaks Mermaid diagrams
  # - pymdownx.extra:
  - pymdownx.arithmatex:
      generic: true
  # `pymdownx.betterem` can be used to override all the current bold and italic rules in Python Markdown
  # - pymdownx.betterem:
  # colored progress bars e.g. `[=25% "25%"]` https://facelessuser.github.io/pymdown-extensions/extensions/progressbar/
  - pymdownx.progressbar:
  # https://facelessuser.github.io/pymdown-extensions/extensions/superfences/
  # pymdownx.superfences can break panzoom functionality when `format: !!python/name:mermaid2.fence_mermaid`
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          # fence_mermaid emits <div class="mermaid">RAW source</div> (source not escaped),
          # which the bundled Mermaid runtime can parse directly. (fence_code_format would
          # wrap it in <pre><code> and HTML-escape the arrows, breaking the parser.)
          format: !!python/name:mermaid2.fence_mermaid
        - name: math
          class: arithmatex
          format: !!python/name:pymdownx.arithmatex.fence_generic_format

extra_css:
  # https://cdnjs.com/libraries/MaterialDesign-Webfont
  - https://cdn.materialdesignicons.com/7.4.47/css/materialdesignicons.css
  - css/mermaid.css
  # Global dark/light aware diagram color tokens & styling
  - css/hide-root-section.css
  # Semantic classDef colors + the C4 in-node label tiers (.c4-name/.c4-type/.c4-detail).
  # This is the plugin's OWN opt-in copy, vendored in the package and copied to
  # assets/stylesheets/ by on_post_build — we dogfood it instead of keeping a docs/ copy.
  # Demonstrated in Mermaid/custom-fonts.md (rationale also in AGENTS.md).
  - assets/stylesheets/hover-tooltip-popup-diagram-colors.css

extra_javascript:
  # Bundle Mermaid offline so the docs never fetch it from a CDN. Material for MkDocs
  # has built-in Mermaid rendering: its bundle calls the global `mermaid` if defined,
  # otherwise it falls back to unpkg.com. Loading this bundle (which sets globalThis.mermaid)
  # means Material renders diagrams with our local copy. Pinned >= 11.15.0.
  # Download newer versions at https://unpkg.com/browse/mermaid@11.15.0/dist/
  - extra/js/mermaid-11.15.0.min.js
  # The plugin's OWN opt-in Mermaid initializer, vendored in the package and copied to
  # assets/javascripts/ by on_post_build. Must load right after the Mermaid bundle.
  - assets/javascripts/hover-tooltip-popup-mermaid-init.js
  - extra/js/refresh-on-toggle-dark-light.js

extra:
  generator: false

plugins:
  - section-index
  - glightbox
  # https://berkkaraal.com/mkdocs-material-mark-as-read/quickstart/
  - mark-as-read:
      texts:
        mark_as_read: "Mark as completed / read"
        read_tooltip: "Red/Completed"
        mark_as_unread: "Mark as incomplete / read again"
        updated_tooltip: "Updated"
  #-
  # mkdocs-exclude usage:
  # - exclude:
  #     glob:
  #       - includes/*
  - literate-nav:
      nav_file: SUMMARY.md
      # implicit_index: false
  #-
  # mkdocs-exclude usage:
  # - exclude:
  #     glob:
  #       - includes/*
  - search:
      lang: en
  - git-revision-date-localized:
      type: timeago
      enable_creation_date: true
  - git-authors:
      add_co_authors: true
      show_contribution: true
      show_line_count: true
      count_empty_lines: true
  # Toggle sidebar plugin - allows users to hide/show left and right sidebars
  - toggle-sidebar:
      toggle_button: all
      inline: true
      show_navigation_by_default: true
      show_toc_by_default: true
  - mermaid2:
      # Minimum supported Mermaid version. The runtime is bundled offline via
      # extra_javascript (mermaid-11.15.0.min.js, a UMD build that sets globalThis.mermaid)
      # and rendered by mermaid-init.js. No `javascript:` here (it would inject a second
      # copy / the ESM CDN URL) and no raw-JS `theme:` (mermaid-init.js handles the theme).
      version: 11.15.0
  - hover-tooltip-popup:
      auto_enable: true                 # Enable smart auto-detection (default: true)
      auto_enable_threshold_lines: 8    # Lines threshold (default: 8)
      auto_enable_threshold_nodes: 6    # Nodes threshold (default: 6)
      auto_enable_threshold_edges: 5    # Edges threshold (default: 5)
      auto_enable_threshold_chars: 200  # Character threshold (default: 200)
      include_selectors:
        - ".mermaid"
        - ".d2"
        - "img"
      always_show_hint: false
      show_zoom_buttons: true
      hint_location: "bottom"
      key: "ctrl" # none/shift/ctrl/alt
      full_screen: true
      initial_zoom_level: 1.0
  - d2
  - tags
